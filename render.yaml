services:
  - type: web
    name: sop-ai-training-backend
    env: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: sop_ai_training
      - key: MONGODB_COLLECTION
        value: training_runs
      - key: ALLOWED_ORIGINS
        sync: false
